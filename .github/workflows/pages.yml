# Veröffentlicht den statischen app/-Ordner auf GitHub Pages.
# Voraussetzung: im Repo unter Settings -> Pages als Source
# "GitHub Actions" auswählen. Die Tiles müssen dafür im Repo liegen
# (app/tiles/ NICHT ignorieren, sofern die Größe passt).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deployment gleichzeitig; laufende abbrechen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Aktiviert Pages via API, falls in den Repo-Settings noch nicht
          # geschehen -> vermeidet "Get Pages site failed / Not Found".
          enablement: true
      - name: Upload artifact (app/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: app
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
